<div class="flex min-h-dvh flex-col bg-gray-50">
	<header class="sticky top-0 z-10 border-b border-gray-200 bg-white/90 backdrop-blur">
		<div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3 sm:px-6">
			<div class="flex items-center gap-3">
				<a class="text-2xl font-semibold tracking-tight text-gray-900" routerLink="/app/projects">
					Updater
				</a>
				<span class="hidden h-5 w-px bg-gray-200 sm:inline-block"></span>
				<span class="hidden text-sm text-gray-600 sm:inline-block">
					Version archive
				</span>
			</div>

			<div class="flex items-center gap-3">
				<button
					type="button"
					class="flex h-10 w-10 items-center justify-center rounded-full bg-gray-100 text-sm font-semibold text-gray-800 ring-1 ring-gray-200 transition hover:bg-gray-200"
					aria-label="Open user menu"
					(click)="userMenu.toggle($event)"
				>
					AO
				</button>

				<p-popover #userMenu>
					<div class="w-[min(320px,80vw)]">
						<div class="flex items-center gap-3">
							<div
								class="flex h-10 w-10 items-center justify-center rounded-full bg-gray-100 text-sm font-semibold text-gray-800 ring-1 ring-gray-200"
								aria-hidden="true"
							>
								AO
							</div>
							<div class="min-w-0">
								<div class="truncate text-sm font-semibold text-gray-900">Multilent Admin</div>
								<div class="truncate text-xs text-gray-600">admin@company.com</div>
							</div>
						</div>

						<div class="my-3 h-px bg-gray-200"></div>

						<a
							class="flex w-full items-center gap-2 rounded-xl px-3 py-2 text-sm text-gray-700 transition hover:bg-gray-50"
							routerLink="/auth/login"
						>
							<i class="pi pi-sign-out text-sm"></i>
							Logout
						</a>
					</div>
				</p-popover>
			</div>
		</div>
	</header>

	<main class="mx-auto w-full max-w-6xl flex-1 px-4 py-6 sm:px-6">
		<router-outlet />
	</main>

	<footer class="mt-auto border-t border-gray-200 bg-white/90 backdrop-blur">
		<div class="mx-auto flex max-w-6xl flex-col gap-2 px-4 py-4 text-sm text-gray-600 sm:flex-row sm:items-center sm:justify-between sm:px-6">
			<span>© 2026 Multilent Softwares</span>
			<span class="text-xs text-gray-500">Updater • Version archive</span>
		</div>
	</footer>

	<p-confirmDialog />
</div>
