<div class="flex min-h-dvh items-center justify-center bg-gray-50 px-4 py-10">
	<div class="w-full max-w-md">
		<div class="mb-6 text-center">
			<div class="text-2xl font-semibold tracking-tight text-gray-900">Updater</div>
			<div class="mt-1 text-sm text-gray-600">Enter your 6-digit authentication code.</div>
		</div>

		<form
			class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm"
			[formGroup]="form"
			(ngSubmit)="verify()"
			novalidate
		>
			<div>
				<label class="mb-1 block text-sm font-medium text-gray-800" for="code">Code</label>
				<input
					id="code"
					type="text"
					inputmode="numeric"
					autocomplete="one-time-code"
					maxlength="6"
					class="h-11 w-full rounded-xl border border-gray-300 bg-white px-3 text-gray-900 outline-none transition focus:border-gray-400 focus:ring-2 focus:ring-gray-200"
					formControlName="code"
				/>
				@if (submitted() && form.controls.code.invalid) {
					<p class="mt-1 text-xs text-red-600">Enter a valid 6-digit code.</p>
				}
			</div>

			<button
				type="submit"
				class="mt-4 h-11 w-full rounded-xl bg-blue-600 px-4 text-sm font-semibold text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-gray-300"
				[disabled]="form.invalid"
			>
				Verify
			</button>

			<div class="mt-5 text-center text-sm">
				<a class="text-gray-700 hover:text-gray-900" routerLink="/auth/login">Back to sign in</a>
			</div>
		</form>

		<p class="mt-6 text-center text-xs text-gray-500">© 2026 Multilent Softwares Company</p>
	</div>
</div>
